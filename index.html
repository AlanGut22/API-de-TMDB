<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor de Series</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <header>
        <h1>Consultor de Series</h1>
        <p>Aplicación web que consulta información desde una API</p>
    </header>

    <main>
        <section class="busqueda">
            <input type="text" id="searchInput" placeholder="Escribe el nombre de la serie asignada" />

            <select id="tipoConsulta">
                <option value="info">Información general</option>
                <option value="actores">Actores y equipo</option>
                <option value="recomendaciones">Recomendaciones</option>
                <option value="videos">Videos</option>
                <option value="imagenes">Imágenes</option>
                <option value="traducciones">Traducciones</option>
            </select>

            <button id="btnBuscar">Buscar</button>
        </section>

        <section id="mensajes"></section>

        <section id="resultados" class="grid-resultados"></section>

        <section id="detalles" class="detalles"></section>
    </main>

    <footer>
        <p>
            Datos proporcionados por la API de
            <a href="https://www.themoviedb.org/" target="_blank">The Movie Database (TMDB)</a>
        </p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
